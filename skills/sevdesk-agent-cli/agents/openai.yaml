display_name: "sevdesk Agent CLI"
short_description: "Read-first sevdesk CLI with local shim install, safe PDF export, contact auto-verify, and context snapshots"
default_prompt: "Use the installed sevdesk CLI shim at `~/.codex/bin/sevdesk-agent`. If it is missing, bootstrap it first with `npx -y -p @codecell-germany/sevdesk-agent-skill sevdesk-agent-skill install --force`. Prefer `find-contact` (or `read find-contact`) for contact discovery and `resolve-billing-contact` for recipient selection. For invoice history checks use `find-invoice --deep-scan` to include position text/name. Keep PDF export in safe mode (preventSendBy=1 default), and use `--decode-pdf --suppress-content` to avoid large base64 output. Use direct writes with preflight + `--verify-contact` for createContact and `--verify` for createOrder/createInvoiceByFactory; when needed enable `--auto-fix-delivery-date` for invoice date/delivery-date consistency. Use `create-invoice-installment` and `invoice clone` for template-based invoice workflows. Require explicit guard flags only for DELETE operations. For CLI/runtime sync use `doctor --json` and `ops-quirks --json-array`. Finish with a context snapshot for handoff."
